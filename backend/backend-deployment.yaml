apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-backend

  template:
    metadata:
      labels:
        app: employee-backend

    spec:
      containers:
      - name: employee-backend

        image: 379113716280.dkr.ecr.ap-southeast-1.amazonaws.com/employee-backend-task5:latest

        ports:
        - containerPort: 5000