apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-frontend
  template:
    metadata:
      labels:
        app: employee-frontend
    spec:
      containers:
      - name: employee-frontend
        image: 379113716280.dkr.ecr.ap-southeast-1.amazonaws.com/employee-frontend-task4:latest
        ports:
        - containerPort: 3000